name: Update submodules

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    env:
      BRANCH: chore/update-submodules
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Switch to update branch
        run: git checkout -B "$BRANCH"

      - name: Update submodules
        run: git submodule update --remote

      - name: Commit and push
        id: push
        run: |
          git diff --quiet && git diff --staged --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" && exit 0
          git add --all
          git commit -m "chore: update submodules $(date -u +'%Y-%m-%d')"
          git push --force-with-lease origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.push.outputs.changed == 'true'
        run: |
          if gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "PR already open, skipping creation."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update submodules" \
              --body "Automated weekly submodule update. Merge when ready."
          fi
